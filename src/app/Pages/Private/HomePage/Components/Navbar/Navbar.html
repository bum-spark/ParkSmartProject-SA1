<header class="bg-white/80 backdrop-blur-xl border-b border-stone-200">
  <div class="container mx-auto px-4 py-4">
    <div class="flex items-center justify-between">
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-amber-500 to-orange-600 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/25">
          <span class="text-xl text-white font-bold">P</span>
        </div>
        <span class="text-xl font-bold text-stone-800">ParkSmart</span>
      </div>
      
      <!-- Usuario y acciones -->
      <div class="flex items-center gap-2">
        <div class="text-right mr-2">
          <p class="text-sm text-stone-500">Bienvenido</p>
          <p class="text-stone-800 font-medium">{{ nombreUsuario() || 'Usuario' }}</p>
        </div>
        
        <!-- Avatar -->
        <div class="avatar avatar-placeholder">
          <div class="bg-amber-500/20 text-amber-700 w-10 rounded-full ring-2 ring-amber-500/50">
            <span class="text-sm font-semibold">{{ iniciales() }}</span>
          </div>
        </div>
        
        <!-- Boton Configuración -->
        <button 
          (click)="abrirDrawer()" 
          class="btn btn-ghost btn-circle text-stone-500 hover:text-stone-800 hover:bg-stone-200"
          title="Configuración"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
        
        <!-- Boton Logout -->
        <button 
          (click)="cerrarSesion()" 
          class="btn btn-ghost btn-circle text-stone-500 hover:text-red-600 hover:bg-red-50"
          title="Cerrar sesión"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>
