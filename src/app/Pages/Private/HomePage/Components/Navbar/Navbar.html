<header class="bg-white/80 backdrop-blur-xl border-b border-stone-200">
  <div class="container mx-auto px-4 py-4">
    <div class="flex items-center justify-between">
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-gradient-to-br from-amber-500 to-orange-600 rounded-xl flex items-center justify-center shadow-lg shadow-amber-500/25">
          <lucide-icon [img]="CarIcon" class="h-6 w-6 text-white"></lucide-icon>
        </div>
        <span class="text-xl font-bold text-stone-800">ParkSmart</span>
      </div>
      
      <!-- Usuario y acciones -->
      <div class="flex items-center gap-2">
        <div class="text-right mr-2">
          <p class="text-sm text-stone-500">Bienvenido</p>
          <p class="text-stone-800 font-medium">{{ nombreUsuario() || 'Usuario' }}</p>
        </div>
        
        <!-- Avatar -->
        <div class="avatar avatar-placeholder">
          <div class="bg-amber-500/20 text-amber-700 w-10 rounded-full ring-2 ring-amber-500/50">
            <span class="text-sm font-semibold">{{ iniciales() }}</span>
          </div>
        </div>
        
        <!-- Boton Configuración -->
        <button 
          (click)="abrirDrawer()" 
          class="btn btn-ghost btn-circle text-stone-500 hover:text-stone-800 hover:bg-stone-200"
          title="Configuración"
        >
          <lucide-icon [img]="SettingsIcon" class="h-5 w-5"></lucide-icon>
        </button>
        
        <!-- Boton Logout -->
        <button 
          (click)="cerrarSesion()" 
          class="btn btn-ghost btn-circle text-stone-500 hover:text-red-600 hover:bg-red-50"
          title="Cerrar sesión"
        >
          <lucide-icon [img]="LogOutIcon" class="h-5 w-5"></lucide-icon>
        </button>
      </div>
    </div>
  </div>
</header>
