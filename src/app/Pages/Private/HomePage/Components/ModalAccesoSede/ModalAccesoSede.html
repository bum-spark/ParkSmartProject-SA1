@if (isOpen()) {
  <div 
    class="fixed inset-0 z-50 overflow-y-auto"
    (keydown)="handleKeydown($event)"
  >
    <!-- Overlay -->
    <div 
      class="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity"
      (click)="cancelar()"
    ></div>
    
    <!-- Modal Container -->
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
        <!-- Header -->
        <div class="bg-gradient-to-r from-amber-500 to-orange-600 rounded-t-2xl p-6 text-white">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
              </svg>
            </div>
            <div>
              <h3 class="text-xl font-bold">Acceso a Sede</h3>
              <p class="text-amber-100 text-sm">{{ nombreSede() }}</p>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="p-6">
          <p class="text-stone-600 mb-4">
            Ingresa la contraseña de acceso para entrar a esta sede.
          </p>

          <!-- Input -->
          <div class="form-control w-full">
            <label class="label">
              <span class="label-text text-stone-700 font-medium">Contraseña de acceso</span>
            </label>
            <div class="relative">
              <input 
                [type]="mostrarPassword() ? 'text' : 'password'"
                class="input input-bordered w-full pr-12 focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20"
                placeholder="Ingresa la contraseña"
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                [disabled]="verificando()"
                autofocus
              />
              <button 
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600"
                (click)="toggleMostrarPassword()"
              >
                @if (mostrarPassword()) {
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                  </svg>
                }
              </button>
            </div>
          </div>

          <!-- Error mensaje -->
          @if (error()) {
            <div class="alert alert-error mt-4">
              <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span>{{ error() }}</span>
            </div>
          }
        </div>

        <!-- Footer -->
        <div class="flex gap-3 p-6 pt-0">
          <button 
            class="btn btn-ghost flex-1"
            (click)="cancelar()"
            [disabled]="verificando()"
          >
            Cancelar
          </button>
          <button 
            class="btn bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white border-0 flex-1"
            (click)="confirmar()"
            [disabled]="!password().trim() || verificando()"
          >
            @if (verificando()) {
              <span class="loading loading-spinner loading-sm"></span>
              Verificando...
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
              </svg>
              Acceder
            }
          </button>
        </div>
      </div>
    </div>
  </div>
}
