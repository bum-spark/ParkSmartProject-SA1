@if (isOpen()) {
  <div 
    class="fixed inset-0 z-50 overflow-y-auto"
    (keydown)="handleKeydown($event)"
  >
    <!-- Overlay -->
    <div 
      class="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity"
      (click)="cancelar()"
    ></div>
    
    <!-- Modal Container -->
    <div class="flex min-h-full items-center justify-center p-4">
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md transform transition-all">
        <!-- Header -->
        <div class="bg-amber-500 rounded-t-2xl p-6 text-white">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-full bg-white/20 flex items-center justify-center">
              <lucide-icon [img]="LockIcon" class="h-6 w-6"></lucide-icon>
            </div>
            <div>
              <h3 class="text-xl font-bold">Acceso a Sede</h3>
              <p class="text-amber-100 text-sm">{{ nombreSede() }}</p>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="p-6">
          <p class="text-stone-600 mb-4">
            Ingresa la contraseña de acceso para entrar a esta sede.
          </p>

          <!-- Input -->
          <div class="form-control w-full">
            <label class="label">
              <span class="label-text text-stone-700 font-medium">Contraseña de acceso</span>
            </label>
            <div class="relative">
              <input 
                [type]="mostrarPassword() ? 'text' : 'password'"
                class="input input-bordered w-full pr-12 focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20"
                [ngClass]="{'input-error border-red-500': passwordInvalido()}"
                placeholder="Ingresa la contraseña"
                [ngModel]="password()"
                (ngModelChange)="password.set($event)"
                (blur)="passwordTouched.set(true)"
                [disabled]="verificando()"
                autofocus
              />
              <button 
                type="button"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600"
                (click)="toggleMostrarPassword()"
              >
                @if (mostrarPassword()) {
                  <lucide-icon [img]="EyeOffIcon" class="h-5 w-5"></lucide-icon>
                } @else {
                  <lucide-icon [img]="EyeIcon" class="h-5 w-5"></lucide-icon>
                }
              </button>
            </div>
            @if (passwordInvalido()) {
              <p class="text-red-500 text-xs mt-1">Ingresa la contraseña para acceder</p>
            }
          </div>

          <!-- Error mensaje -->
          @if (error()) {
            <div class="alert alert-error mt-4">
              <lucide-icon [img]="XCircleIcon" class="stroke-current shrink-0 h-5 w-5"></lucide-icon>
              <span>{{ error() }}</span>
            </div>
          }
        </div>

        <!-- Footer -->
        <div class="flex gap-3 p-6 pt-0">
          <button 
            class="btn btn-ghost flex-1"
            (click)="cancelar()"
            [disabled]="verificando()"
          >
            Cancelar
          </button>
          <button 
            class="btn bg-orange-600 hover:bg-orange-700 text-white border-0 flex-1 cursor-pointer"
            (click)="confirmar()"
            [disabled]="!password().trim() || verificando()"
          >
            @if (verificando()) {
              <span class="loading loading-spinner loading-sm"></span>
              Verificando...
            } @else {
              <lucide-icon [img]="LockOpenIcon" class="h-5 w-5 mr-1"></lucide-icon>
              Acceder
            }
          </button>
        </div>
      </div>
    </div>
  </div>
}
