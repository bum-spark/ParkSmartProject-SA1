@if (isOpen()) {
  <div class="fixed inset-0 bg-stone-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4" (click)="cerrar()">
    <div class="bg-white border border-stone-200 rounded-2xl shadow-2xl w-full max-w-md" (click)="$event.stopPropagation()">
      <!-- Header modal -->
      <div class="p-6 border-b border-stone-200">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-500/20 rounded-xl flex items-center justify-center">
              <lucide-icon [img]="LockIcon" class="h-5 w-5 text-amber-600"></lucide-icon>
            </div>
            <div>
              <h3 class="text-lg font-semibold text-stone-800">Acceso para Edición</h3>
              <p class="text-sm text-stone-500">{{ sede()?.nombre }}</p>
            </div>
          </div>
          <button (click)="cerrar()" class="btn btn-ghost btn-sm btn-circle text-stone-400 hover:text-stone-800">
            <lucide-icon [img]="XIcon" class="h-5 w-5"></lucide-icon>
          </button>
        </div>
      </div>
      
      <!-- Body modal -->
      <div class="p-6">
        <!-- Mensaje informativo -->
        <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-4">
          <div class="flex items-start gap-3">
            <lucide-icon [img]="InfoIcon" class="h-5 w-5 text-amber-600 mt-0.5 shrink-0"></lucide-icon>
            <p class="text-sm text-amber-800">
              Ingresa la contraseña de acceso de la sede para poder editarla. 
              Esta es la contraseña configurada al crear la sede.
            </p>
          </div>
        </div>
        
        <!-- Error -->
        @if (error()) {
          <div class="bg-red-50 border border-red-200 rounded-lg p-3 mb-4">
            <p class="text-red-600 text-sm text-center">{{ error() }}</p>
          </div>
        }
        
        <!-- Campo de contraseña -->
        <div class="form-control">
          <label class="label">
            <span class="label-text text-stone-600">Contraseña de acceso *</span>
          </label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3">
              <lucide-icon [img]="KeyIcon" class="h-5 w-5 text-stone-400"></lucide-icon>
            </span>
            <input 
              [type]="mostrarPassword() ? 'text' : 'password'" 
              [ngModel]="passwordAcceso()" 
              (ngModelChange)="passwordAcceso.set($event)"
              (blur)="passwordTouched.set(true)"
              (keyup.enter)="verificar()"
              placeholder="Ingresa la contraseña de acceso"
              class="input input-bordered w-full pl-10 pr-10 bg-stone-50 border-stone-300 text-stone-800 placeholder-stone-400 focus:border-amber-500"
              [ngClass]="{'input-error border-red-500': passwordInvalido()}"
              [disabled]="verificando()"
              autofocus
            />
            <button 
              type="button" 
              (click)="toggleMostrarPassword()"
              class="absolute inset-y-0 right-0 flex items-center pr-3 text-amber-600 hover:text-amber-700"
            >
              @if (mostrarPassword()) {
                <lucide-icon [img]="EyeOffIcon" class="h-5 w-5"></lucide-icon>
              } @else {
                <lucide-icon [img]="EyeIcon" class="h-5 w-5"></lucide-icon>
              }
            </button>
          </div>
          @if (passwordInvalido()) {
            <p class="text-red-500 text-xs mt-1">Ingresa la contraseña para verificar</p>
          }
        </div>
      </div>
      
      <!-- Footer modal -->
      <div class="p-6 border-t border-stone-200 flex gap-3">
        <button 
          (click)="cerrar()" 
          class="btn flex-1 bg-stone-200 hover:bg-stone-300 text-stone-700 border-0"
          [disabled]="verificando()"
        >
          Cancelar
        </button>
        <button 
          (click)="verificar()" 
          class="btn flex-1 bg-orange-600 hover:bg-orange-700 text-white border-0"
          [disabled]="verificando() || !passwordAcceso().trim()"
        >
          @if (verificando()) {
            <span class="loading loading-spinner loading-sm"></span>
            Verificando...
          } @else {
            <lucide-icon [img]="LockOpenIcon" class="h-5 w-5 mr-1"></lucide-icon>
            Verificar Acceso
          }
        </button>
      </div>
    </div>
  </div>
}
