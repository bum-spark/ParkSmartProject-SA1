<!-- Loader -->
@if (cargando()) {
  <div class="flex justify-center py-12">
    <span class="loading loading-spinner loading-lg text-amber-500"></span>
  </div>
} @else {
  <!-- Grid de sedes -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6">
    

    <!-- Tarjetas de sedes existentes -->
    @for (sede of sedes(); track sede.sedeId) {
      <app-sede-card
        [sede]="sede"
        [esAdmin]="esAdmin()"
        [accesoInfo]="getAccesoInfo(sede)"
        (onAcceder)="handleAcceder($event)"
        (onEditar)="handleEditar($event)"
      />
    } @empty {
      @if (!esAdmin()) {
        <!-- Estado vacio para usuarios no admin -->
        <div class="col-span-full flex flex-col items-center justify-center py-16 text-center">
          <div class="w-20 h-20 rounded-full bg-stone-100 flex items-center justify-center mb-4">
            <lucide-icon [img]="BuildingIcon" class="h-10 w-10 text-stone-400"></lucide-icon>
          </div>
          <h3 class="text-lg font-semibold text-stone-700 mb-2">No hay sedes disponibles</h3>
          <p class="text-sm text-stone-500">Las sedes aparecerán aquí cuando estén disponibles</p>
        </div>
      }
    }

    <!-- Tarjeta Nueva Sede (solo Admin) -->
    @if (esAdmin()) {
      <button 
        (click)="crearNuevaSede()"
        class="bg-white/50 backdrop-blur-xl border-2 border-dashed border-stone-300 rounded-2xl p-8 flex flex-col items-center justify-center gap-4 hover:border-amber-400 hover:bg-amber-50/50 transition-all duration-300 group min-h-[280px] cursor-pointer"
      >
        <div class="w-16 h-16 rounded-full bg-orange-600 flex items-center justify-center group-hover:scale-110 transition-transform shadow-lg shadow-amber-500/25">
          <lucide-icon [img]="PlusIcon" class="h-8 w-8 text-white"></lucide-icon>
        </div>
        <span class="text-lg font-medium text-stone-600 group-hover:text-amber-600 transition-colors">
          Nueva Sede
        </span>
        <span class="text-sm text-stone-400">
          Agregar estacionamiento
        </span>
      </button>
    }
  </div>
}
