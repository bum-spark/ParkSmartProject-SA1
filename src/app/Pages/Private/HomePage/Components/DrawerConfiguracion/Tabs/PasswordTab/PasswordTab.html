<div class="max-w-md">
  <p class="text-stone-500 text-sm mb-6">Cambia tu contraseña de acceso</p>
  
  <div class="space-y-4">
    <!-- Contraseña actual -->
    <div class="form-control">
      <label class="label">
        <span class="label-text text-stone-600 font-medium">Contraseña actual</span>
      </label>
      <div class="relative">
        <input 
          [type]="mostrarPasswordActual() ? 'text' : 'password'" 
          [ngModel]="passwordActual()" 
          (ngModelChange)="passwordActual.set($event)"
          (blur)="passwordActualTouched.set(true)"
          class="input input-bordered w-full pr-10 bg-stone-50 border-stone-300 text-stone-800 focus:border-amber-500"
          [ngClass]="{'input-error border-red-500': passwordActualInvalida()}"
          placeholder="••••••••"
          [disabled]="guardando()"
        />
        <button 
          type="button" 
          (click)="toggleMostrarPasswordActual()"
          class="absolute inset-y-0 right-0 flex items-center pr-3 text-amber-600 hover:text-amber-700"
        >
          @if (mostrarPasswordActual()) {
            <lucide-icon [img]="EyeOffIcon" class="h-5 w-5"></lucide-icon>
          } @else {
            <lucide-icon [img]="EyeIcon" class="h-5 w-5"></lucide-icon>
          }
        </button>
      </div>
      @if (passwordActualInvalida()) {
        <p class="text-red-500 text-xs mt-1">Ingresa tu contraseña actual</p>
      }
    </div>
    
    <!-- Nueva contraseña -->
    <div class="form-control">
      <label class="label">
        <span class="label-text text-stone-600 font-medium">Nueva contraseña</span>
      </label>
      <div class="relative">
        <input 
          [type]="mostrarPasswordNueva() ? 'text' : 'password'" 
          [ngModel]="passwordNueva()" 
          (ngModelChange)="passwordNueva.set($event)"
          (blur)="passwordNuevaTouched.set(true)"
          class="input input-bordered w-full pr-10 bg-stone-50 border-stone-300 text-stone-800 focus:border-amber-500"
          [ngClass]="{'input-error border-red-500': passwordNuevaInvalida()}"
          placeholder="Mínimo 6 caracteres"
          [disabled]="guardando()"
        />
        <button 
          type="button" 
          (click)="toggleMostrarPasswordNueva()"
          class="absolute inset-y-0 right-0 flex items-center pr-3 text-amber-600 hover:text-amber-700"
        >
          @if (mostrarPasswordNueva()) {
            <lucide-icon [img]="EyeOffIcon" class="h-5 w-5"></lucide-icon>
          } @else {
            <lucide-icon [img]="EyeIcon" class="h-5 w-5"></lucide-icon>
          }
        </button>
      </div>
      @if (passwordNuevaInvalida()) {
        <p class="text-red-500 text-xs mt-1">La contraseña debe tener al menos 6 caracteres</p>
      }
    </div>
    
    <!-- Confirmar contraseña -->
    <div class="form-control">
      <label class="label">
        <span class="label-text text-stone-600 font-medium">Confirmar nueva contraseña</span>
      </label>
      <input 
        type="password" 
        [ngModel]="passwordConfirmar()" 
        (ngModelChange)="passwordConfirmar.set($event)"
        (blur)="passwordConfirmarTouched.set(true)"
        class="input input-bordered bg-stone-50 border-stone-300 text-stone-800 focus:border-amber-500"
        [ngClass]="{'input-error border-red-500': passwordConfirmarInvalida()}"
        placeholder="Repite la contraseña"
        [disabled]="guardando()"
      />
      @if (passwordConfirmarInvalida()) {
        <p class="text-red-500 text-xs mt-1">Las contraseñas no coinciden</p>
      }
    </div>
    
    <!-- Boton guardar -->
    <button 
      (click)="guardar()" 
      class="btn bg-orange-600 hover:bg-orange-700 text-white border-0 w-full mt-6"
      [disabled]="guardando()"
    >
      @if (guardando()) {
        <span class="loading loading-ring loading-sm"></span>
        Cambiando...
      } @else {
        Cambiar Contraseña
      }
    </button>
  </div>
</div>
