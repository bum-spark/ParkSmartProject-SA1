<div class="max-w-md">
  <p class="text-stone-500 text-sm mb-6">Cambia tu contraseña de acceso</p>
  
  @if (error()) {
    <div role="alert" class="alert alert-error bg-red-50 border-red-200 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 stroke-red-600" fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-red-600 text-sm">{{ error() }}</span>
    </div>
  }
  
  @if (exito()) {
    <div role="alert" class="alert alert-success bg-green-50 border-green-200 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 stroke-green-600" fill="none" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
      <span class="text-green-600 text-sm">Contraseña actualizada correctamente</span>
    </div>
  }
  
  <div class="space-y-4">
    <!-- Contraseña actual -->
    <div class="form-control">
      <label class="label">
        <span class="label-text text-stone-600 font-medium">Contraseña actual</span>
      </label>
      <div class="relative">
        <input 
          [type]="mostrarPasswordActual() ? 'text' : 'password'" 
          [ngModel]="passwordActual()" 
          (ngModelChange)="passwordActual.set($event)"
          class="input input-bordered w-full pr-10 bg-stone-50 border-stone-300 text-stone-800 focus:border-amber-500"
          placeholder="••••••••"
          [disabled]="guardando()"
        />
        <button 
          type="button" 
          (click)="toggleMostrarPasswordActual()"
          class="absolute inset-y-0 right-0 flex items-center pr-3 text-amber-600 hover:text-amber-700"
        >
          @if (mostrarPasswordActual()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          }
        </button>
      </div>
    </div>
    
    <!-- Nueva contraseña -->
    <div class="form-control">
      <label class="label">
        <span class="label-text text-stone-600 font-medium">Nueva contraseña</span>
      </label>
      <div class="relative">
        <input 
          [type]="mostrarPasswordNueva() ? 'text' : 'password'" 
          [ngModel]="passwordNueva()" 
          (ngModelChange)="passwordNueva.set($event)"
          class="input input-bordered w-full pr-10 bg-stone-50 border-stone-300 text-stone-800 focus:border-amber-500"
          placeholder="Mínimo 6 caracteres"
          [disabled]="guardando()"
        />
        <button 
          type="button" 
          (click)="toggleMostrarPasswordNueva()"
          class="absolute inset-y-0 right-0 flex items-center pr-3 text-amber-600 hover:text-amber-700"
        >
          @if (mostrarPasswordNueva()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          }
        </button>
      </div>
    </div>
    
    <!-- Confirmar contraseña -->
    <div class="form-control">
      <label class="label">
        <span class="label-text text-stone-600 font-medium">Confirmar nueva contraseña</span>
      </label>
      <input 
        type="password" 
        [ngModel]="passwordConfirmar()" 
        (ngModelChange)="passwordConfirmar.set($event)"
        class="input input-bordered bg-stone-50 border-stone-300 text-stone-800 focus:border-amber-500"
        placeholder="Repite la contraseña"
        [disabled]="guardando()"
      />
    </div>
    
    <!-- Boton guardar -->
    <button 
      (click)="guardar()" 
      class="btn bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white border-0 w-full mt-6"
      [disabled]="guardando()"
    >
      @if (guardando()) {
        <span class="loading loading-ring loading-sm"></span>
        Cambiando...
      } @else {
        Cambiar Contraseña
      }
    </button>
  </div>
</div>
