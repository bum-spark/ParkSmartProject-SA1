<div class="max-w-md">
  <p class="text-stone-500 text-sm mb-6">Actualiza tu información personal</p>
  
  <div class="space-y-4">
    <!-- Nombre -->
    <div class="form-control">
      <label class="label">
        <span class="label-text text-stone-600 font-medium">Nombre completo</span>
      </label>
      <input 
        type="text" 
        [ngModel]="nombreLocal()" 
        (ngModelChange)="nombreLocal.set($event)"
        (blur)="nombreTouched.set(true)"
        class="input input-bordered bg-stone-50 border-stone-300 text-stone-800 focus:border-amber-500"
        [ngClass]="{'input-error border-red-500': nombreInvalido()}"
        [disabled]="guardando()"
      />
      @if (nombreInvalido()) {
        <p class="text-red-500 text-xs mt-1">El nombre debe tener al menos 3 caracteres</p>
      }
    </div>
    
    <!-- Email -->
    <div class="form-control">
      <label class="label">
        <span class="label-text text-stone-600 font-medium">Correo electrónico</span>
      </label>
      <input 
        type="email" 
        [ngModel]="emailLocal()" 
        (ngModelChange)="emailLocal.set($event)"
        (blur)="emailTouched.set(true)"
        class="input input-bordered bg-stone-50 border-stone-300 text-stone-800 focus:border-amber-500"
        [ngClass]="{'input-error border-red-500': emailInvalido()}"
        [disabled]="guardando()"
      />
      @if (emailInvalido()) {
        <p class="text-red-500 text-xs mt-1">Ingresa un correo electrónico válido</p>
      }
    </div>
    
    <!-- Boton guardar -->
    <button 
      (click)="guardar()" 
      class="btn bg-orange-600 hover:bg-orange-700 text-white border-0 w-full mt-6"
      [disabled]="guardando()"
    >
      @if (guardando()) {
        <span class="loading loading-ring loading-sm"></span>
        Guardando...
      } @else {
        Guardar Cambios
      }
    </button>
  </div>
</div>
