<button 
  class="relative p-4 rounded-xl border-2 transition-all w-full cursor-pointer hover:scale-105 {{ estadoColor() }}"
  [disabled]="estaDeshabilitado()"
  (click)="handleClick()"
>
  <!-- Icono SVG según tipo de cajón -->
  <div class="flex justify-center mb-1">
    @switch (cajon().tipo) {
      @case ('electrico') {
        <lucide-icon [img]="ZapIcon" class="w-8 h-8 text-green-400"></lucide-icon>
      }
      @case ('discapacitado') {
        <lucide-icon [img]="AccessibilityIcon" class="w-8 h-8 text-blue-400"></lucide-icon>
      }
      @default {
        <lucide-icon [img]="CarIcon" class="w-8 h-8 text-stone-500"></lucide-icon>
      }
    }
  </div>

  <!-- Número de cajón -->
  <div class="font-bold">{{ cajon().numeroCajon }}</div>
  
  <!-- Placa del vehículo o estado del cajón -->
  @if (mostrarPlaca() && cajon().placaVehiculo) {
    <div class="text-xs font-mono font-semibold truncate" [class.text-red-600]="cajon().estadoActual === 'ocupado'" [class.text-amber-600]="cajon().estadoActual === 'reservado'">
      {{ cajon().placaVehiculo }}
    </div>
  } @else {
    <div class="text-xs opacity-70 capitalize">{{ cajon().estadoActual }}</div>
  }
  
  <!-- Botones de acción (solo para cajones libres) -->
  @if (esLibre()) {
    <!-- Botón Reservar -->
    <button 
      (click)="handleReservar($event)"
      class="absolute -bottom-2 -right-2 w-16 h-6 bg-amber-500 rounded-full flex items-center justify-center text-xs cursor-pointer hover:bg-amber-400 transition-colors shadow-lg text-white"
      title="Reservar cajón"
    >
      ¿Reservar?
    </button>
    
    <!-- Botón Cambiar Tipo (Solo Admin) -->
    @if (esAdmin()) {
      <button 
        (click)="handleCambiarTipo($event)"
        class="absolute cursor-pointer -top-2 -left-2 w-6 h-6 bg-amber-500 text-stone-800 rounded-full flex items-center justify-center hover:bg-amber-400 transition-colors shadow-lg"
        title="Cambiar tipo de cajón"
      >
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    }
  }
</button>
