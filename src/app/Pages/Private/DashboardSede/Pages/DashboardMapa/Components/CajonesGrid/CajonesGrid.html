<div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-3">
  @for (cajon of cajones(); track cajon.cajonId) {
    <app-cajon-card
      [cajon]="cajon"
      [esAdmin]="esAdmin()"
      (onCajonClick)="handleCajonClick($event)"
      (onReservar)="handleReservar($event)"
      (onCambiarTipo)="handleCambiarTipo($event)"
    />
  }
</div>
