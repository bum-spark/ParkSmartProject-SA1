<!-- Header -->
<header class="sticky top-0 z-20 bg-white/80 backdrop-blur-xl border-b border-stone-200 px-4 lg:px-6 py-4">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      <!-- Mobile menu -->
      <div class="dropdown lg:hidden">
        <div tabindex="0" role="button" class="btn btn-ghost btn-sm btn-circle text-stone-500">
          <lucide-icon [img]="MenuIcon" class="h-5 w-5"></lucide-icon>
        </div>
        <ul tabindex="0" class="dropdown-content z-50 menu p-2 shadow-lg bg-white rounded-box w-52 border border-stone-200">
          <li><a [routerLink]="['/dashboard', sedeId(), 'dashboard']" routerLinkActive="bg-amber-100">Dashboard</a></li>
          <li><a [routerLink]="['/dashboard', sedeId(), 'mapa']" routerLinkActive="bg-amber-100">Mapa</a></li>
          <li><a [routerLink]="['/dashboard', sedeId(), 'reservas']" routerLinkActive="bg-amber-100">Reservas</a></li>
          <li><a [routerLink]="['/dashboard', sedeId(), 'historial']" routerLinkActive="bg-amber-100">Historial</a></li>
          <li class="border-t border-stone-200 mt-2 pt-2"><a (click)="volverInicio()">Cambiar Sede</a></li>
          <li><a (click)="cerrarSesion()" class="text-red-500">Cerrar Sesion</a></li>
        </ul>
      </div>
      <div>
        <h1 class="text-xl font-bold text-stone-800">{{ getTituloTab() }}</h1>
        <p class="text-sm text-stone-500">{{ direccionSede() }}</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="text-right hidden sm:block">
        <p class="text-sm text-stone-500 capitalize">{{ rolUsuario() }}</p>
        <p class="text-stone-800 font-medium">{{ nombreUsuario() }}</p>
      </div>
      <div class="avatar avatar-placeholder">
        <div class="bg-amber-500/20 text-amber-700 rounded-full w-10 ring-2 ring-amber-500/50">
          <span class="text-sm font-semibold">{{ iniciales() }}</span>
        </div>
      </div>
    </div>
  </div>
</header>
